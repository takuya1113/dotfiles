##### Prefix（Leader）
#
# Ctrl-Space (C-@) is unreliable on this Mac across terminal apps.
# Use Ctrl-] as the primary prefix and keep Ctrl-Space as a secondary
# prefix for environments where it is delivered correctly.
set -g prefix C-]
set -g prefix2 C-@
unbind C-b
bind C-] send-prefix
bind C-@ send-prefix

# terminal capabilities
# macOS 12 on this machine does not have tmux-256color terminfo installed.
# Use screen-256color to avoid broken readline/backspace behavior inside tmux.
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm*:RGB"


##### 基本操作を Vim 寄せ

# split / popup（v=左右, s=上下, P=横長popup, H/L=左右半分popup, cwdを引き継ぐ）
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind P display-popup -E -w 100% -h 55% -d "#{pane_current_path}"
bind H display-popup -E -x 0 -y 0 -w 50% -h 100% -d "#{pane_current_path}"
bind L display-popup -E -x "#{e|-:#{client_width},#{popup_width}}" -y 0 -w 50% -h 100% -d "#{pane_current_path}"

# pane 移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind i display-panes

# Zoom（最大化トグル）
bind o resize-pane -Z

# pane を閉じる
bind q confirm-before -p "Kill pane? (y/n)" kill-pane

# レイアウト切り替え
set -g main-pane-width 60%
unbind e
unbind a
bind g set-option -q key-table layout

# 新しいタブ（window）
bind t new-window -c "#{pane_current_path}"
bind c swap-pane -s '{marked}' -t .

# タブ移動
bind n previous-window
bind p next-window

# タブ名変更
bind , command-prompt -p "Rename tab" "rename-window '%%'"

# tmux終了
bind Q confirm-before -p "Quit tmux? (y/n)" kill-server

# 設定リロード
bind R source-file ~/.tmux.conf \; display "reloaded!"


##### Resize モード（Ctrl+Space, r → h/j/k/l でリサイズ）
bind r set-option -q key-table resize

bind -T resize h resize-pane -L 3
bind -T resize j resize-pane -D 2
bind -T resize k resize-pane -U 2
bind -T resize l resize-pane -R 3

bind -T resize Escape set-option -q key-table root
bind -T resize Enter  set-option -q key-table root

##### Layout モード（Ctrl+Space, g → e/a でレイアウト変更）
bind -T layout e select-layout tiled \; set-option -q key-table root
bind -T layout a select-layout main-vertical \; set-option -q key-table root
bind -T layout Escape set-option -q key-table root
bind -T layout Enter  set-option -q key-table root

##### Copy Mode を Vim 操作に
set -g mode-keys vi
set -g history-limit 50000

# Ctrl+Space, y で copy-mode
bind y copy-mode

# copy-mode 中のキー
bind -T copy-mode-vi v if-shell -F '#{selection_present}' 'send -X clear-selection' 'send -X begin-selection'
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi u send -X page-up
bind -T copy-mode-vi d send -X page-down
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi q send -X cancel
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down

##### 見た目（最低限）

set -g status-style bg=default
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=green

# status bar は表示
set -g status on
set -g status-position bottom

# 余計な情報を消す
set -g status-left ""
set -g status-right ""

# window表示フォーマット（非アクティブ）
set -g window-status-format " #I:#W "

# アクティブwindowの表示フォーマット（色つき）
set -g window-status-current-format " #[fg=black,bg=green,bold] #I:#W #[default] "

# * 表示を消す
set -g window-status-current-style ""
set -g window-status-style ""

# 区切り文字もシンプルに
set -g window-status-separator ""

##### マウスは使わない（tmux主体のためOFF）
set -g mouse off
